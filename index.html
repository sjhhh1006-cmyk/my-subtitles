<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 网页视频大屏字幕神器</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 💡 上半部分：用来装你想看的视频网站 */
        #video-frame-container {
            width: 100%;
            height: 65vh; /* 视频占据上方 65% 的大屏幕 */
            background-color: #111;
            border-bottom: 2px solid #333;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 💡 下半部分：完全独立的字幕区，绝对不遮挡视频 */
        #subtitles-section {
            width: 100%;
            height: 35vh; /* 字幕占据下方 35% 空间 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        .control-panel {
            position: absolute;
            top: 5px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(30, 30, 30, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 999;
        }
        select, input, button {
            padding: 6px 10px;
            font-size: 0.85rem;
            background-color: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
        }
        button {
            background-color: #007aff;
            font-weight: bold;
            border: none;
        }
        
        #text-output {
            width: 90%;
            font-size: 2.2rem; /* 巨大的通顺字幕 */
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            word-wrap: break-word;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }

        .safari-bait { position: absolute; top: -9999px; opacity: 0; }
    </style>
</head>
<body>

    <div id="video-frame-container">
        <iframe id="videoFrame" src=""></iframe>
        <div id="urlPrompt" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <input type="text" id="urlInput" placeholder="请在这里粘贴视频网址 (URL)..." style="width: 280px; padding: 10px; font-size: 1rem;">
            <button id="loadUrlBtn" style="padding: 10px 15px; font-size: 1rem; margin-left: 5px;">前往播放</button>
        </div>
    </div>
    
    <div id="subtitles-section">
        <div class="control-panel">
            <select id="langSelect">
                <option value="en-US">🇺🇸 英语 (English)</option>
                <option value="ja-JP">🇯🇵 日语 (日本語)</option>
            </select>
            <button id="startBtn">开启字幕</button>
        </div>
        
        <div id="text-output">Please select a language and click the button...</div>
    </div>

    <div class="safari-bait">
        <p>This is placeholder text to force Safari browser's translation engine to detect this web page as a foreign language document and enable the translation option in the menu immediately.</p>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const langSelect = document.getElementById('langSelect');
        const textOutput = document.getElementById('text-output');
        const videoFrame = document.getElementById('videoFrame');
        const urlInput = document.getElementById('urlInput');
        const loadUrlBtn = document.getElementById('loadUrlBtn');
        const urlPrompt = document.getElementById('urlPrompt');

        const initTips = {
            "en-US": "Please select a language and click the button...",
            "ja-JP": "言語を選択してボタンをクリックしてください..."
        };

        // 加载视频网址
        loadUrlBtn.onclick = () => {
            let url = urlInput.value.trim();
            if (url) {
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                videoFrame.src = url;
                urlPrompt.style.display = 'none'; // 隐藏输入框，露出视频
            }
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        let isListening = false;
        let sentenceBuffer = ""; 

        function initRecognition() {
            recognition.continuous = true;
            recognition.interimResults = true; 
            recognition.lang = langSelect.value; 

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                let textToDisplay = finalTranscript || interimTranscript;
                if (textToDisplay.trim()) {
                    let separator = langSelect.value === "en-US" ? " " : "";
                    let combined = sentenceBuffer ? (sentenceBuffer + separator + textToDisplay) : textToDisplay;
                    
                    if (finalTranscript.trim() || combined.split(' ').length > 8 || combined.length > 12) {
                        textOutput.innerText = combined;
                        if (finalTranscript.trim()) { sentenceBuffer = ""; }
                    } else {
                        sentenceBuffer = combined;
                    }
                }
            };

            recognition.onend = () => { if (isListening) { recognition.start(); } };
        }

        initRecognition();

        langSelect.onchange = () => {
            sentenceBuffer = "";
            textOutput.innerText = initTips[langSelect.value];
            initRecognition(); 
        };

        startBtn.onclick = () => {
            if (!isListening) {
                isListening = true;
                sentenceBuffer = "";
                recognition.start();
                startBtn.innerText = "停止";
                startBtn.style.backgroundColor = "#ff3b30";
                textOutput.innerText = langSelect.value === "en-US" ? "Listening..." : "聴取中...";
            } else {
                isListening = false;
                recognition.stop();
                startBtn.innerText = "开启字幕";
                startBtn.style.backgroundColor = "#007aff";
                textOutput.innerText = initTips[langSelect.value];
            }
        };
    </script>
</body>
</html>
