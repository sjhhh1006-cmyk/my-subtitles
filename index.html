<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 多语言实时字幕</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .control-panel {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(30, 30, 30, 0.8);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            z-index: 999;
        }
        select {
            padding: 10px;
            font-size: 1rem;
            background-color: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background-color: #0056b3; }
        #subtitles-container {
            width: 90%;
            max-width: 600px;
            margin-top: 35vh; 
            text-align: center;
        }
        #text-output {
            font-size: 2.4rem;
            font-weight: bold;
            line-height: 1.6;
            word-wrap: break-word;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <select id="langSelect">
            <option value="en-US">🇺🇸 英语 (English)</option>
            <option value="ja-JP">🇯🇵 日语 (日本語)</option>
        </select>
        <button id="startBtn">开启字幕</button>
    </div>
    
    <div id="subtitles-container">
        <div id="text-output">选择语言并点击开启按钮...</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const langSelect = document.getElementById('langSelect');
        const textOutput = document.getElementById('text-output');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("请使用 iOS Safari 浏览器打开！");
        }

        let recognition = new SpeechRecognition();
        let isListening = false;

        // 配置语音识别参数
        function initRecognition() {
            recognition.continuous = true;
            recognition.interimResults = true;
            // 动态获取下拉菜单选择的语言：en-US 或 ja-JP
            recognition.lang = langSelect.value; 

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const currentSentence = finalTranscript || interimTranscript;
                if (currentSentence.trim()) {
                    // 当英文或日文蹦出来时，Safari 会在后台瞬间帮我们翻译成中文
                    textOutput.innerText = currentSentence;
                }
            };

            recognition.onerror = (event) => {
                console.error("识别错误: ", event.error);
            };

            // 长视频自动重连机制
            recognition.onend = () => {
                if (isListening) {
                    console.log("重新连接聆听...");
                    recognition.start();
                }
            };
        }

        // 初始化
        initRecognition();

        // 点击开始/停止按钮
        startBtn.onclick = () => {
            if (!isListening) {
                isListening = true;
                recognition.start();
                startBtn.innerText = "停止";
                startBtn.style.backgroundColor = "#ff3b30";
                textOutput.innerText = "正在聆听中，请播放视频...";
            } else {
                isListening = false;
                recognition.stop();
                startBtn.innerText = "开启字幕";
                startBtn.style.backgroundColor = "#007aff";
            }
        };

        // 💡 核心改动：当你在网页上切换语言时，自动重置识别引擎
        langSelect.onchange = () => {
            const wasListening = isListening;
            if (isListening) {
                isListening = false;
                recognition.stop(); // 先停止旧语种
            }
            
            // 重新初始化并更换语种
            initRecognition(); 
            
            if (wasListening) {
                // 如果本来就在运行，切换后自动恢复运行
                setTimeout(() => {
                    isListening = true;
                    recognition.start();
                }, 300);
            }
            textOutput.innerText = "语种已切换，等待识别...";
        };
    </script>
</body>
</html>
